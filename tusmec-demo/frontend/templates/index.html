<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tusmec · Sürü Demo Konsolu</title>
  <link rel="stylesheet" href="/static/css/theme.css?v=3">
  <style>
    /* Sayfa 1: Görev parametreleri + simülasyon (ROI sayfası ile aynı boyut/düzen) */
    body {
      height: 100vh;
      overflow: hidden;
      margin: 0;
    }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 1rem;
      padding: 1rem 1.25rem;
      width: 100%;
      min-height: 0;
    }

    @media (max-width: 900px) {
      body {
        height: auto;
        overflow: auto;
      }
      main {
        grid-template-columns: 1fr;
        display: flex;
        flex-direction: column;
      }
      .panel {
        overflow-y: visible;
      }
      .stage {
        min-height: 500px; /* Mobilde simülasyonun sıkışmasını önler */
      }
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow-y: auto; /* İçerik taşarsa panel kendi içinde kayar, sayfa kaymaz */
    }

    .stage {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 0;
      width: 100%;
    }

    canvas#field {
      width: 100%;
      flex: 1;
      background: var(--field);
      border: 1px solid var(--ob);
      border-radius: 10px;
      display: block;
      touch-action: none;
      min-height: 0; /* Kanvasın doğal yüksekliğinde takılı kalmasını ve taşmasını önler */
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      padding-top: 0.75rem;
      justify-content: center;
      font-size: .75rem;
      color: var(--ink-dim);
    }

    .dot {
      display: inline-block;
      width: .6rem;
      height: .6rem;
      border-radius: 50%;
      margin-right: .3rem;
    }

  </style>
</head>

<body>
  <header>
    <h1>TUS<b>MEC</b> · Sürü Demo Konsolu</h1>
    <div class="header-actions">
      <button id="theme-toggle" class="icon-btn" type="button">☀️ Açık</button>
    </div>
  </header>
  <main>
    <section class="panel">
      <h2>Görev Parametreleri</h2>
      <label for="task">Görev tipi</label>
      <select id="task">
        <option value="depo_lojistigi">Depo lojistiği</option>
        <option value="tarim">Tarım</option>
        <option value="guvenlik_devriyesi">Güvenlik devriyesi</option>
      </select>
      <label for="area">Alan büyüklüğü (m²)</label>
      <input id="area" type="number" value="8000" min="100">
      <label>Hedef filo</label>
      <div class="fleet">
        <div><label for="uav">UAV</label><input id="uav" type="number" value="0" min="0"></div>
        <div><label for="ugv">UGV</label><input id="ugv" type="number" value="1" min="0"></div>
        <div><label for="amr">AMR</label><input id="amr" type="number" value="6" min="0"></div>
      </div>
      <label>Engeller — konumlar rastgele, canvas'ta sürükleyerek taşıyabilirsin</label>
      <div class="fleet">
        <div><label for="obs-n">Adet</label><input id="obs-n" type="number" value="5" min="0" max="30"></div>
        <div><label for="obs-hmin">Yük. min (m)</label><input id="obs-hmin" type="number" value="8" min="1"></div>
        <div><label for="obs-hmax">Yük. maks (m)</label><input id="obs-hmax" type="number" value="25" min="1"></div>
      </div>
      <button id="start">Simülasyonu başlat</button>
      <button id="stop" class="secondary">Durdur</button>
      <button id="goto-roi" class="secondary">ROI Hesaplama →</button>
      <p class="engine-badge">Motor: <b id="engine">—</b></p>
    </section>

    <section class="stage">
      <canvas id="field" width="1200" height="760" aria-label="Sürü simülasyon alanı"></canvas>
      <div class="legend">
        <span>🚁 UAV</span>
        <span>🚙 UGV</span>
        <span>🤖 AMR</span>
        <span><i class="dot" style="background:var(--ob)"></i>Engel</span>
      </div>
    </section>
  </main>
  <script src="/static/js/theme.js?v=1"></script>
  <script src="/static/js/console.js?v=7"></script>
</body>

</html>
